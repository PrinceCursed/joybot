<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JOY Dance & Art Studio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#f0eded;--text:#1a1a1a;--text-dim:#777;--text-muted:#aaa;
            --surface:rgba(255,255,255,0.88);--surface2:rgba(255,255,255,0.94);--hover:rgba(0,0,0,0.03);
            --border:rgba(0,0,0,0.08);--pill:rgba(255,255,255,0.8);
            --act:#1a1a1a;--act-t:#fff;
            --bk-bg:rgba(0,0,0,0.02);--bk-brd:rgba(0,0,0,0.15);
            --toast-bg:#1a1a1a;--toast-t:#fff;--modal:#f5f2ef;--sh:rgba(0,0,0,0.12);
            --v1:rgba(0,0,0,0.06);--v2:rgba(0,0,0,0.04);--v3:rgba(0,0,0,0.03);--vg:rgba(140,120,80,0.05);
            --ms1:rgba(220,215,210,0.7);--ms2:rgba(200,195,188,0.4);
        }
        .dark{
            --bg:#111;--text:#e8e4df;--text-dim:#888480;--text-muted:#5a5753;
            --surface:rgba(255,255,255,0.06);--surface2:rgba(255,255,255,0.08);--hover:rgba(255,255,255,0.04);
            --border:rgba(255,255,255,0.08);--pill:rgba(255,255,255,0.06);
            --act:#e8e4df;--act-t:#111;
            --bk-bg:rgba(255,255,255,0.04);--bk-brd:rgba(255,255,255,0.2);
            --toast-bg:#e8e4df;--toast-t:#111;--modal:#1a1a1a;--sh:rgba(0,0,0,0.4);
            --v1:rgba(255,255,255,0.04);--v2:rgba(255,255,255,0.03);--v3:rgba(255,255,255,0.025);--vg:rgba(180,160,110,0.06);
            --ms1:rgba(30,28,26,0.8);--ms2:rgba(40,37,34,0.5);
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:40px}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:
            linear-gradient(125deg,transparent 20%,var(--v1) 21%,transparent 23%),
            linear-gradient(215deg,transparent 35%,var(--v1) 36.2%,transparent 37.5%),
            linear-gradient(160deg,transparent 50%,var(--v2) 51%,transparent 52.5%),
            linear-gradient(75deg,transparent 15%,var(--v2) 16%,transparent 17.5%),
            linear-gradient(195deg,transparent 60%,var(--v1) 61%,transparent 62.5%),
            linear-gradient(105deg,transparent 42%,var(--v3) 43%,transparent 44.5%),
            linear-gradient(250deg,transparent 28%,var(--v2) 29%,transparent 30.5%),
            linear-gradient(132deg,transparent 30%,var(--vg) 30.8%,transparent 31.5%),
            linear-gradient(210deg,transparent 55%,var(--vg) 55.6%,transparent 56.2%),
            linear-gradient(85deg,transparent 72%,var(--vg) 72.5%,transparent 73%),
            radial-gradient(ellipse 700px 500px at 25% 20%,var(--ms1),transparent),
            radial-gradient(ellipse 500px 700px at 75% 70%,var(--ms2),transparent)
        }
        .app{position:relative;z-index:1;max-width:480px;margin:0 auto}

        .header{text-align:center;padding:28px 20px 4px}
        .logo{font-weight:900;font-size:40px;letter-spacing:14px;text-transform:uppercase;color:var(--text)}
        .sub{font-size:9px;letter-spacing:7px;text-transform:uppercase;color:var(--text-dim);font-weight:700;margin-top:6px}
        .greeting{text-align:center;font-size:12px;color:var(--text-dim);margin:12px 0 16px;font-weight:500}

        /* Location selector */
        .loc-sel{display:flex;margin:0 16px 6px;gap:6px}
        .loc-btn{flex:1;padding:10px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--pill);backdrop-filter:blur(8px);color:var(--text-muted);font-size:10px;font-weight:700;letter-spacing:0.5px;cursor:pointer;transition:all .25s ease;text-align:center;line-height:1.3}
        .loc-btn.active{background:var(--act);border-color:var(--act);color:var(--act-t);box-shadow:0 3px 12px var(--sh)}
        .loc-addr{text-align:center;font-size:10px;color:var(--text-muted);margin:0 0 14px;font-weight:500;letter-spacing:0.5px}

        /* Tabs */
        .tabs{display:flex;margin:0 16px 16px;background:var(--surface);backdrop-filter:blur(16px);border-radius:12px;padding:3px;border:1px solid var(--border)}
        .tab{flex:1;padding:11px 0;text-align:center;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);border:none;background:transparent;cursor:pointer;border-radius:9px;transition:all .25s ease}
        .tab.active{background:var(--act);color:var(--act-t);box-shadow:0 2px 10px var(--sh)}

        .section{display:none;padding:0 16px}.section.active{display:block}

        .categories{display:flex;gap:6px;overflow-x:auto;padding:0 0 12px;scrollbar-width:none}
        .categories::-webkit-scrollbar{display:none}
        .cat-pill{flex-shrink:0;padding:7px 14px;border-radius:30px;border:1.5px solid var(--border);background:var(--pill);backdrop-filter:blur(8px);color:var(--text-dim);font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:all .25s ease;white-space:nowrap}
        .cat-pill.active{background:var(--act);border-color:var(--act);color:var(--act-t)}

        .day-sel{display:flex;gap:5px;margin-bottom:14px}
        .day-btn{flex:1;padding:11px 0;border-radius:10px;border:1.5px solid var(--border);background:var(--pill);backdrop-filter:blur(8px);color:var(--text-muted);font-size:12px;font-weight:800;cursor:pointer;transition:all .25s ease;text-align:center}
        .day-btn.active{background:var(--act);border-color:var(--act);color:var(--act-t);box-shadow:0 3px 12px var(--sh)}

        .lw{background:var(--surface2);backdrop-filter:blur(20px);border-radius:14px;border:1px solid var(--border);overflow:hidden}
        .lr{padding:14px 18px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:background .15s ease;border-bottom:1px solid var(--border)}
        .lr:last-child{border-bottom:none}
        .lr:active{background:var(--hover)}
        .lr.booked{background:var(--bk-bg)}
        .lt{min-width:50px;font-weight:900;font-size:15px;color:var(--text);letter-spacing:.5px;flex-shrink:0}
        .li{flex:1;min-width:0}
        .ln{font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text);line-height:1.4}
        .lm{font-size:10px;color:var(--text-dim);font-weight:500;margin-top:2px}
        .lb{font-size:9px;padding:3px 9px;border-radius:20px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;flex-shrink:0;border:1.5px solid var(--bk-brd);color:var(--text-dim)}
        .empty{text-align:center;padding:50px 20px;color:var(--text-muted);font-size:13px;font-weight:500}

        .sh{font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:4px;color:var(--text);margin-bottom:16px;text-align:center}
        /* Pricing type selector */
        .price-tabs{display:flex;margin:0 0 14px;background:var(--surface);border-radius:10px;padding:3px;border:1px solid var(--border)}
        .price-tab{flex:1;padding:9px 0;text-align:center;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);border:none;background:transparent;cursor:pointer;border-radius:7px;transition:all .25s ease}
        .price-tab.active{background:var(--act);color:var(--act-t)}

        .pc{background:var(--surface2);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;padding:20px 18px;margin-bottom:10px;position:relative;overflow:hidden;cursor:pointer;transition:all .25s ease}
        .pc:active{transform:scale(.985)}
        .pc.pop{border-color:var(--text);box-shadow:0 4px 20px var(--sh)}
        .pc .pt{position:absolute;top:11px;right:13px;font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--act-t);background:var(--act);padding:3px 9px;border-radius:20px}
        .pc .pn{font-weight:900;font-size:17px;text-transform:uppercase;letter-spacing:2px;color:var(--text);margin-bottom:2px}
        .pc .pd{font-size:11px;color:var(--text-dim);margin-bottom:12px;font-weight:400}
        .pc .pp{font-weight:900;font-size:28px;color:var(--text)}
        .pc .pp .cur{font-size:15px;font-weight:600;color:var(--text-dim)}
        .pc .pper{font-size:11px;color:var(--text-muted);font-weight:500;margin-top:2px}
        .pc .pf{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
        .pc .ft{font-size:11px;padding:2px 0;color:var(--text-dim);font-weight:500}
        .pc .ft::before{content:'— ';color:var(--text-muted)}
        .disc-note{font-size:10px;color:var(--text-dim);text-align:center;margin-top:10px;line-height:1.6;font-weight:400;padding:0 4px}

        .mo{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:50;backdrop-filter:blur(8px);animation:fi .2s ease}
        .mo.active{display:flex;align-items:flex-end}
        .md{width:100%;max-width:480px;margin:0 auto;background:var(--modal);border-radius:20px 20px 0 0;padding:26px 22px;padding-bottom:max(26px,env(safe-area-inset-bottom));animation:su .35s cubic-bezier(.16,1,.3,1)}
        @keyframes su{from{transform:translateY(100%)}}
        @keyframes fi{from{opacity:0}}
        .mh{width:36px;height:3px;background:var(--text-muted);border-radius:3px;margin:0 auto 20px;opacity:.4}
        .md h3{font-weight:900;font-size:17px;text-transform:uppercase;letter-spacing:2px;color:var(--text);margin-bottom:10px}
        .md .mm{font-size:13px;color:var(--text-dim);margin-bottom:22px;line-height:1.8;font-weight:400}
        .md .mm strong{color:var(--text);font-weight:700}
        .bb{width:100%;padding:15px;border:none;border-radius:10px;background:var(--act);color:var(--act-t);font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .25s ease}
        .bb:active{transform:scale(.97);opacity:.85}
        .bc{width:100%;padding:13px;border:none;background:transparent;color:var(--text-muted);font-family:'Montserrat',sans-serif;font-weight:600;font-size:11px;cursor:pointer;margin-top:6px;letter-spacing:2px;text-transform:uppercase}

        .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-120%);background:var(--toast-bg);color:var(--toast-t);border-radius:10px;padding:11px 26px;font-size:12px;font-weight:700;letter-spacing:1px;z-index:100;transition:transform .4s cubic-bezier(.4,0,.2,1);white-space:nowrap}
        .toast.visible{transform:translateX(-50%) translateY(0)}
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">JOY</div>
        <div class="sub">dance & art studio</div>
    </div>
    <div class="greeting" id="greeting">Добро пожаловать</div>

    <div class="loc-sel">

        <button class="loc-btn" onclick="setLoc(1,this)">ул. Советская, 36к7</button>
    </div>
    <div class="loc-addr" id="addr">ул. Флерова, 3</div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('schedule',this)">Расписание</button>
        <button class="tab" onclick="switchTab('pricing',this)">Абонементы</button>
    </div>

    <div class="section active" id="sec-schedule">
        <div class="categories" id="cats"></div>
        <div class="day-sel" id="days"></div>
        <div id="list"></div>
    </div>
    <div class="section" id="sec-pricing"></div>
</div>

<div class="mo" id="modal" onclick="if(event.target===this)hideM()">
    <div class="md">
        <div class="mh"></div>
        <h3 id="mT"></h3>
        <div class="mm" id="mM"></div>
        <button class="bb" id="mB" onclick="doBook()">Записаться</button>
        <button class="bc" onclick="hideM()">Отмена</button>
    </div>
</div>
<div class="toast" id="toast"></div>

    {id:'kids',name:'Kids'},
];
const DAYS=['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];
const ADDRS=['ул. Флерова, 3','ул. Советская, 36к7'];

// PRICING
const PR_OPEN=[
    {name:'4 занятия',price:3000,period:'14 дней',feat:['Нет заморозки','Несколько направлений']},
    {name:'8 занятий',price:5500,period:'30 дней',feat:['Заморозка 5 дней','Несколько направлений'],pop:true},
    {name:'12 занятий',price:7200,period:'30 дней',feat:['Заморозка 7 дней','Несколько направлений']},
    {name:'16 занятий',price:9000,period:'30 дней',feat:['Заморозка 7 дней','Несколько направлений']},
    {name:'Безлимит',price:12000,period:'30 дней',feat:['Без ограничений','Нет заморозки']},
];
const PR_OPEN_DISC=[
    {name:'4 занятия',price:2800,period:'14 дней',feat:['Нет заморозки']},
    {name:'8 занятий',price:5200,period:'30 дней',feat:['Заморозка 5 дней'],pop:true},
    {name:'12 занятий',price:6900,period:'30 дней',feat:['Заморозка 7 дней']},
    {name:'16 занятий',price:8500,period:'30 дней',feat:['Заморозка 7 дней']},
];
const PR_OPEN_EXT=[
    {name:'8 занятий',price:6000,period:'45 дней',feat:['Нет заморозки','Несколько направлений']},
    {name:'12 занятий',price:8400,period:'45 дней',feat:['Нет заморозки','Несколько направлений']},
];
const PR_KIDS=[
    {name:'4 занятия',price:2600,period:'14 дней',feat:['Нет заморозки']},
    {name:'8 занятий',price:5100,period:'30 дней',feat:['Заморозка 5 дней'],pop:true},
    {name:'12 занятий',price:5800,period:'30 дней',feat:['Заморозка 7 дней']},
];
const PR_KIDS_DISC=[
    {name:'4 занятия',price:2400,period:'14 дней',feat:['Нет заморозки']},
    {name:'8 занятий',price:4800,period:'30 дней',feat:['Заморозка 5 дней'],pop:true},
    {name:'12 занятий',price:5500,period:'30 дней',feat:['Заморозка 7 дней']},
];
const PR_KIDS_EXT=[
    {name:'8 занятий',price:5500,period:'45 дней',feat:['Нет заморозки']},
    {name:'12 занятий',price:7800,period:'45 дней',feat:['Нет заморозки']},
];

const PTYPES=[
    {id:'open',name:'Открытые',data:PR_OPEN},
    {id:'open5',name:'Со скидкой 5%',data:PR_OPEN_DISC},
    {id:'open45',name:'45 дней',data:PR_OPEN_EXT},
    {id:'kids',name:'Baby/Kids',data:PR_KIDS},
    {id:'kids5',name:'Kids -5%',data:PR_KIDS_DISC},
    {id:'kids45',name:'Kids 45д',data:PR_KIDS_EXT},
];

let loc=0,aCat='all',aDay=null,booked=new Set(),cur=null,pType='open';

function init(){
    const d=new Date().getDay();
    aDay=DAYS[[6,0,1,2,3,4,5][d]];
    rCats();rDays();rList();rPrice();
}
function data(){return loc===0?F:S}
function rCats(){
    const cats=new Set();
    data().forEach(x=>cats.add(x.c));
    const vis=CATS.filter(c=>c.id==='all'||cats.has(c.id));
    document.getElementById('cats').innerHTML=vis.map(c=>`<button class="cat-pill${c.id===aCat?' active':''}" onclick="sCat('${c.id}')">${c.name}</button>`).join('');
}
function rDays(){
    const has=new Set();data().forEach(x=>has.add(x.d));
    document.getElementById('days').innerHTML=DAYS.map(d=>{
        const avail=has.has(d);
        return`<button class="day-btn${d===aDay?' active':''}${!avail?' disabled':''}" onclick="${avail?"sDay('"+d+"')":''}" style="${avail?'':'opacity:0.3;pointer-events:none'}">${d}</button>`;
    }).join('');
}
function rList(){
    const el=document.getElementById('list');
    let f=data().filter(l=>l.d===aDay);
    if(aCat!=='all')f=f.filter(l=>l.c===aCat);
    f.sort((a,b)=>a.t.localeCompare(b.t));
    if(!f.length){el.innerHTML='<div class="empty">Нет занятий</div>';return}
    el.innerHTML='<div class="lw">'+f.map(l=>{
        const bk=booked.has(l.id);
        return`<div class="lr${bk?' booked':''}" onclick="openB('${l.id}')">
            <div class="lt">${l.t}</div>
            <div class="li"><div class="ln">${l.n}</div><div class="lm">${cName(l.c)}</div></div>
            ${bk?'<span class="lb">Записан</span>':''}</div>`;
    }).join('')+'</div>';
}
function rPrice(){
    const p=PTYPES.find(x=>x.id===pType);
    document.getElementById('sec-pricing').innerHTML=
        '<div class="sh">Абонементы</div>'+
        '<div class="price-tabs">'+PTYPES.map(x=>`<button class="price-tab${x.id===pType?' active':''}" onclick="setPT('${x.id}')">${x.name}</button>`).join('')+'</div>'+
        p.data.map(x=>
            `<div class="pc${x.pop?' pop':''}" onclick="buyP('${x.name}',${x.price})">
                ${x.pop?'<div class="pt">Хит</div>':''}
                <div class="pn">${x.name}</div>
                <div class="pd">${x.period}</div>
                <div class="pp">${x.price.toLocaleString('ru')} <span class="cur">₽</span></div>
                <div class="pf">${x.feat.map(f=>`<div class="ft">${f}</div>`).join('')}</div>
            </div>`
        ).join('')+
        '<div class="disc-note">Скидка 5%: в день пробного занятия, в день окончания абонемента или при оплате наличными. Абонемент начинает действовать с первого посещения.</div>';
}

function setLoc(i,el){
    loc=i;aCat='all';
    document.querySelectorAll('.loc-btn').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('addr').textContent=ADDRS[i];
    // Check if current day has classes
    const has=new Set();data().forEach(x=>has.add(x.d));
    if(!has.has(aDay))aDay=DAYS.find(d=>has.has(d))||'ПН';
    rCats();rDays();rList();hap('light');
}
function switchTab(t,el){
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
    el.classList.add('active');document.getElementById('sec-'+t).classList.add('active');hap('light');
}
function sCat(id){aCat=id;rCats();rList();hap('light')}
function sDay(d){aDay=d;rDays();rList();hap('light')}
function setPT(id){pType=id;rPrice();hap('light')}
function cName(id){const c=CATS.find(x=>x.id===id);return c?c.name:''}

function openB(lid){
    const l=data().find(x=>x.id===lid);if(!l)return;
    cur=l;hap('medium');
    const bk=booked.has(lid);
    document.getElementById('mT').textContent=l.n;
    document.getElementById('mM').innerHTML=
        `<strong>Время:</strong> ${l.t}, ${l.d}<br>`+
        `<strong>Направление:</strong> ${cName(l.c)}<br>`+
        `<strong>Филиал:</strong> ${ADDRS[loc]}`;
    const btn=document.getElementById('mB');
    if(bk){btn.textContent='Отменить запись';btn.style.background='var(--surface)';btn.style.color='var(--text-dim)'}
    else{btn.textContent='Записаться';btn.style.background='var(--act)';btn.style.color='var(--act-t)'}
    document.getElementById('modal').classList.add('active');
}
function hideM(){document.getElementById('modal').classList.remove('active');cur=null}
function doBook(){
    if(!cur)return;
    const bk=booked.has(cur.id);
    if(bk){booked.delete(cur.id);showT('Запись отменена');hap('warning','n')}
    else{booked.add(cur.id);showT('✓ Вы записаны');hap('success','n')}
    const d={action:bk?'cancel':'book',lesson:cur.n,day:cur.d,time:cur.t,location:ADDRS[loc],
        user_id:user?.id||null,user_name:user?(user.first_name+(user.last_name?' '+user.last_name:'')):''};
    try{tg.sendData(JSON.stringify(d))}catch(e){}
    hideM();rList();
}
function buyP(name,price){
    hap('medium');
    try{tg.sendData(JSON.stringify({action:'buy_plan',plan:name,price,location:ADDRS[loc],
        user_id:user?.id||null,user_name:user?(user.first_name+(user.last_name?' '+user.last_name:'')):''}))}catch(e){}
    showT('Запрос отправлен');
}
function hap(t,m){try{m==='n'?tg.HapticFeedback.notificationOccurred(t):tg.HapticFeedback.impactOccurred(t)}catch(e){}}
function showT(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('visible');setTimeout(()=>t.classList.remove('visible'),2500)}

init();
</script>
</body>
</html>
